<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry Message</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:zoom 2s ease;
}

h1{
    color:white;
    font-size:50px;
    text-shadow:0 0 15px rgba(255,255,255,0.7);
    line-height:1.5;
}

.btn{
    display:inline-block;
    margin-top:40px;
    padding:15px 35px;
    border-radius:40px;
    background:white;
    color:#ff4f8b;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    background:#ff4f8b;
    color:white;
    box-shadow:0 0 20px #ff4f8b;
}

@keyframes zoom{
    from{
        opacity:0;
        transform:scale(0.5);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.star{
    position:absolute;
    color:white;
    font-size:25px;
    animation:stars 6s linear infinite;
}

@keyframes stars{
    from{
        transform:translateY(100vh) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(-100vh) rotate(360deg);
        opacity:0;
    }
}

</style>

</head>

<body>

<div class="star" style="left:10%;">✨</div>
<div class="star" style="left:25%; animation-duration:4s;">💖</div>
<div class="star" style="left:50%; animation-duration:7s;">🌸</div>
<div class="star" style="left:75%; animation-duration:5s;">💫</div>
<div class="star" style="left:90%; animation-duration:6s;">💕</div>

<div class="container">

<h1>
Meri pyaarii si jaan Ke Liye  
Pyara Sa Sorry 
</h1>

<a href="Srr.html" class="btn">
&#128151;Open Final Message&#128151;
</a>

</div>

</body>
</html>
