<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Message</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

.card{
    background:rgba(255,255,255,0.2);
    padding:50px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
    animation:fade 2s ease;
}

h1{
    color:white;
    font-size:45px;
    text-shadow:0 0 10px rgba(255,255,255,0.7);
}

p{
    color:white;
    margin-top:15px;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    background:white;
    color:#ff4e8d;
    text-decoration:none;
    border-radius:40px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    background:#ff4e8d;
    color:white;
    box-shadow:0 0 20px #ff4e8d;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(0.8);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.circle{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    animation:move 8s infinite alternate;
}

.circle:nth-child(1){
    top:10%;
    left:10%;
}

.circle:nth-child(2){
    bottom:10%;
    right:10%;
}

@keyframes move{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(40px);
    }
}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="card">

<h1>Gussa ho kya Madam Ji...? 🥺</h1>

<p>
Maan jaao na...  
Itni bhi kya narazgi 🌸
</p>

<a href="Cut.html" class="btn">
Next Message 
</a>

</div>

</body>
</html>
