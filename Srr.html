<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Sorry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff6a88,#ff99ac);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    text-align:center;
}

h1{
    color:white;
    font-size:55px;
    text-shadow:0 0 15px rgba(255,255,255,0.8);
    animation:pulse 2s infinite;
}

p{
    margin-top:20px;
    color:white;
    font-size:22px;
    width:80%;
    line-height:1.8;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

.heart{
    position:absolute;
    font-size:30px;
    animation:float 6s linear infinite;
    opacity:0.8;
}

@keyframes float{

    from{
        transform:translateY(100vh);
        opacity:1;
    }

    to{
        transform:translateY(-100vh);
        opacity:0;
    }

}

.glow{
    margin-top:35px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4d88;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.glow:hover{
    transform:scale(1.1);
    background:#ff4d88;
    color:white;
    box-shadow:0 0 25px #ff4d88;
}

</style>

</head>

<body>

<div class="heart" style="left:10%;">💖</div>
<div class="heart" style="left:20%; animation-duration:4s;">💕</div>
<div class="heart" style="left:35%; animation-duration:7s;">🌸</div>
<div class="heart" style="left:50%; animation-duration:5s;">💗</div>
<div class="heart" style="left:65%; animation-duration:6s;">✨</div>
<div class="heart" style="left:80%; animation-duration:4s;">💞</div>
<div class="heart" style="left:92%; animation-duration:8s;">💝</div>

<h1>Sorryyyy 🥺💞</h1>

<p>
Please maan jaao na... ✨💖
</p>

<button class="glow" onclick="showMessage()">
Click Here 💌
</button>

<script>

function showMessage(){

    alert("Yayyy!!!  Thank you for forgiving me 🌸 \n\n made with 💖 from mudassir.");

}

</script>

</body>
</html>
