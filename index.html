<!DOCTYPE html>

<title>Saqlain's Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

h1{
    color:white;
    font-size:60px;
    text-shadow:0 0 15px rgba(255,255,255,0.7);
    animation:slide 2s ease;
}

.btn{
    margin-top:30px;
    padding:15px 35px;
    background:white;
    color:#764ba2;
    text-decoration:none;
    border-radius:40px;
    font-size:20px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    background:#ff4ecd;
    color:white;
    box-shadow:0 0 20px #ff4ecd;
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateY(-100px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }

    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="heart" style="left:30%; animation-duration:7s;">✨</div>
<div class="heart" style="left:50%; animation-duration:4s;">💗</div>
<div class="heart" style="left:70%; animation-duration:6s;">💫</div>
<div class="heart" style="left:90%; animation-duration:5s;">💕</div>

</html>
